name: Firebase SO Generator (Fixed Matrix)

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      api_key:
        description: 'Firebase API Key'
        required: true
      db_url:
        description: 'Firebase Database URL'
        required: true
      app_id:
        description: 'Firebase App ID'
        required: true
      project_id:
        description: 'Firebase Project ID'
        required: true

jobs:
  build:
    name: Build for ${{ matrix.abi }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Create Native Code
        run: |
          cat <<EOF > native-lib.cpp
          #include <jni.h>
          extern "C" JNIEXPORT jstring JNICALL Java_ce_ef_billtwintytwoo_NativeLib_getApiKey(JNIEnv* env, jobject) { return env->NewStringUTF("${{ github.event.inputs.api_key }}"); }
          extern "C" JNIEXPORT jstring JNICALL Java_ce_ef_billtwintytwoo_NativeLib_getDbUrl(JNIEnv* env, jobject) { return env->NewStringUTF("${{ github.event.inputs.db_url }}"); }
          extern "C" JNIEXPORT jstring JNICALL Java_ce_ef_billtwintytwoo_NativeLib_getAppId(JNIEnv* env, jobject) { return env->NewStringUTF("${{ github.event.inputs.app_id }}"); }
          extern "C" JNIEXPORT jstring JNICALL Java_ce_ef_billtwintytwoo_NativeLib_getProjectId(JNIEnv* env, jobject) { return env->NewStringUTF("${{ github.event.inputs.project_id }}"); }
          EOF

      - name: Create CMakeLists
        run: |
          cat <<EOF > CMakeLists.txt
          cmake_minimum_required(VERSION 3.10)
          project(native-lib)
          set(CMAKE_CXX_FLAGS "\${CMAKE_CXX_FLAGS} -Oz -fvisibility=hidden -fdata-sections -ffunction-sections")
          add_library(native-lib SHARED native-lib.cpp)
          target_link_libraries(native-lib -Wl,--gc-sections log)
          EOF

      - name: Configure and Build
        run: |
          mkdir build && cd build
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=${{ matrix.abi }} \
                -DANDROID_PLATFORM=android-24 \
                -DCMAKE_BUILD_TYPE=Release \
                -G "Unix Makefiles" ..
          make

      - name: Strip Debug Symbols (Size Fix)
        run: |
          STRIP=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          $STRIP --strip-unneeded build/libnative-lib.so
          mv build/libnative-lib.so ./libnative-lib_${{ matrix.abi }}.so

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: firebase_so_${{ matrix.abi }}
          path: libnative-lib_${{ matrix.abi }}.so

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: output
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Optimized Triple SO Build
          files: output/*.so
