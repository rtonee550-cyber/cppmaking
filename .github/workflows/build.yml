name: Firebase SO Generator

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      api_key:
        description: 'Firebase API Key'
        required: true
      db_url:
        description: 'Firebase Database URL'
        required: true
      app_id:
        description: 'Firebase App ID'
        required: true
      project_id:
        description: 'Firebase Project ID'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Create Native Code
        run: |
          cat <<EOF > native-lib.cpp
          #include <jni.h>

          extern "C" JNIEXPORT jstring JNICALL
          Java_ce_ef_billtwintytwoo_NativeLib_getApiKey(JNIEnv* env, jobject) {
              return env->NewStringUTF("${{ github.event.inputs.api_key }}");
          }

          extern "C" JNIEXPORT jstring JNICALL
          Java_ce_ef_billtwintytwoo_NativeLib_getDbUrl(JNIEnv* env, jobject) {
              return env->NewStringUTF("${{ github.event.inputs.db_url }}");
          }

          extern "C" JNIEXPORT jstring JNICALL
          Java_ce_ef_billtwintytwoo_NativeLib_getAppId(JNIEnv* env, jobject) {
              return env->NewStringUTF("${{ github.event.inputs.app_id }}");
          }

          extern "C" JNIEXPORT jstring JNICALL
          Java_ce_ef_billtwintytwoo_NativeLib_getProjectId(JNIEnv* env, jobject) {
              return env->NewStringUTF("${{ github.event.inputs.project_id }}");
          }
          EOF

      - name: Create CMakeLists
        run: |
          cat <<EOF > CMakeLists.txt
          cmake_minimum_required(VERSION 3.10)
          project(native-lib)

          add_library(native-lib SHARED native-lib.cpp)
          EOF

      - name: Build SO File
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=arm64-v8a \
                -DANDROID_PLATFORM=android-24 ..
          make

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: firebase_so
          path: build/libnative-lib.so

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest SO Build
          files: build/libnative-lib.so
