name: Firebase SO Generator (Optimized)

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      api_key:
        description: 'Firebase API Key'
        required: true
      db_url:
        description: 'Firebase Database URL'
        required: true
      app_id:
        description: 'Firebase App ID'
        required: true
      project_id:
        description: 'Firebase Project ID'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Create Native Code
        run: |
          cat <<EOF > native-lib.cpp
          #include <jni.h>
          extern "C" JNIEXPORT jstring JNICALL Java_ce_ef_billtwintytwoo_NativeLib_getApiKey(JNIEnv* env, jobject) { return env->NewStringUTF("${{ github.event.inputs.api_key }}"); }
          extern "C" JNIEXPORT jstring JNICALL Java_ce_ef_billtwintytwoo_NativeLib_getDbUrl(JNIEnv* env, jobject) { return env->NewStringUTF("${{ github.event.inputs.db_url }}"); }
          extern "C" JNIEXPORT jstring JNICALL Java_ce_ef_billtwintytwoo_NativeLib_getAppId(JNIEnv* env, jobject) { return env->NewStringUTF("${{ github.event.inputs.app_id }}"); }
          extern "C" JNIEXPORT jstring JNICALL Java_ce_ef_billtwintytwoo_NativeLib_getProjectId(JNIEnv* env, jobject) { return env->NewStringUTF("${{ github.event.inputs.project_id }}"); }
          EOF

      - name: Create Optimized CMakeLists
        run: |
          cat <<EOF > CMakeLists.txt
          cmake_minimum_required(VERSION 3.10)
          project(native-lib)
          set(CMAKE_C_FLAGS "\${CMAKE_C_FLAGS} -Oz -fvisibility=hidden -fdata-sections -ffunction-sections")
          set(CMAKE_CXX_FLAGS "\${CMAKE_CXX_FLAGS} -Oz -fvisibility=hidden -fdata-sections -ffunction-sections")
          add_library(native-lib SHARED native-lib.cpp)
          target_link_libraries(native-lib -Wl,--gc-sections)
          EOF

      - name: Build and Strip (Size Fix)
        run: |
          ABIS=("arm64-v8a" "armeabi-v7a" "x86_64")
          for ABI in "\${ABIS[@]}"; do
            mkdir -p "build_\$ABI" && cd "build_\$ABI"
            cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
                  -DANDROID_ABI=\$ABI -DANDROID_PLATFORM=android-24 -DCMAKE_BUILD_TYPE=Release ..
            make
            # Stripping debug symbols to reduce size
            $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip --strip-unneeded libnative-lib.so
            mv libnative-lib.so ../libnative-lib_\$ABI.so
            cd ..
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Optimized SO Build
          files: |
            libnative-lib_arm64-v8a.so
            libnative-lib_armeabi-v7a.so
            libnative-lib_x86_64.so
